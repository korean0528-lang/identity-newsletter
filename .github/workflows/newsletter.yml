name: Identity Tech Newsletter

on:
  schedule:
    # 평일 09:00 KST = UTC 00:00 (월~금)
    - cron: '0 0 * * 1-5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (이메일 발송 없이 로그만 출력)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      force:
        description: 'Force (이미 본 글도 다시 처리)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run newsletter bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: '587'
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.SMTP_USER }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          python main.py $ARGS
